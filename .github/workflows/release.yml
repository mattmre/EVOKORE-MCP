name: Release

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Verify release commit is on origin/main
      run: |
        git fetch --no-tags origin main:refs/remotes/origin/main
        git merge-base --is-ancestor "$GITHUB_SHA" origin/main

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Run test suite
      run: npm test

    - name: Build package
      run: npm run build

    - name: Publish to npm
      if: ${{ env.NPM_TOKEN != '' }}
      env:
        NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
      run: npm publish

    - name: Publish skipped (NPM_TOKEN missing)
      if: ${{ env.NPM_TOKEN == '' }}
      run: echo "NPM_TOKEN is not configured; publish step skipped."
