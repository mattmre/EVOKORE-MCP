name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - run: npm ci
    
    - name: Normalize Skills Frontmatter
      run: node scripts/clean_skills.js
      
    - name: Build MCP Server
      run: npx tsc
