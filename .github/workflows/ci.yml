name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Validate submodule cleanliness
      run: node scripts/validate-submodule-cleanliness.js

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        
    - run: npm ci
    
    - name: Normalize Skills Frontmatter
      run: node scripts/clean_skills.js
      
    - name: Build MCP Server
      run: npx tsc

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Validate submodule cleanliness
      run: node scripts/validate-submodule-cleanliness.js

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Validate PR metadata
      if: github.event_name == 'pull_request'
      run: node scripts/validate-pr-metadata.js

    - run: npm ci

    - name: Run tests
      run: npm test

  windows-runtime:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Validate submodule cleanliness
      run: node scripts/validate-submodule-cleanliness.js

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - run: npm ci

    - run: node test-windows-exec-validation.js

    - run: npx tsx test-windows-command-runtime-validation.ts
